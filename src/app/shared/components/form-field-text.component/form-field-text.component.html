<div class="form">
  @if (label) {
    <label [for]="label" class="form-label">{{ label }}</label>
  }

  <input
    [type]="type"
    [placeholder]="placeholder"
    (input)="onInput($event)"
    (blur)="onTouched()"
    [value]="inputAtual"
    [disabled]="disabled"
    [class.input-error]="exibirErro"
  />

  @if (exibirErro) {
    <span class="error-message" role="alert">
      {{ errorMessage }}
    </span>
  }
</div>
